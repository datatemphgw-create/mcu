<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Pasien</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
        }

        .card-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .card-header p {
            font-size: 1rem;
        }
        #qrcode-container {
            padding: 10px;
            background-color: white;
        }
        .icon-container {
            width: 24px;
            text-align: center;
        }
        .fa-check-circle {
            color: var(--bs-success);
        }
        .fa-clock {
            color: var(--bs-secondary);
        }
    </style>
</head>
<body>

    <div class="container mt-4" id="detail-container">
        <!-- Konten akan diisi oleh JavaScript -->
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const detailContainer = document.getElementById('detail-container');
            const BASE_URL = 'https://script.google.com/macros/s/AKfycbyy3KSVJTjsVozvo5MWcsbuPjYdzZ0t6c1Ske5DcNQXS5ERglK6JeFViLD4plQrVIlQ/exec';

            const urlParams = new URLSearchParams(window.location.search);
            const mrn = urlParams.get('mrn');

            if (!mrn) {
                detailContainer.innerHTML = `<div class="error">MRN tidak ditemukan di URL.</div>`;
                return;
            }

            const fetchAndRenderData = () => {
                const FIND_URL = `${BASE_URL}?action=find&mrn=${mrn}`;

                fetch(FIND_URL)
                    .then(response => response.json())
                    .then(res => {
                        if (res.status) {
                            const pasien = res.data;
                            
                            const steps = [
                                { name: 'Timbang Tensi', value: pasien.timbang_tensi },
                                { name: 'Visus', value: pasien.visus },
                                { name: 'Lab', value: pasien.lab },
                                { name: 'Urine', value: pasien.urine },
                                { name: 'EKG', value: pasien.ekg },
                                { name: 'Rontgen', value: pasien.rontgen },
                                { name: 'Dokter', value: pasien.dokter },
                                { name: 'Treadmill', value: pasien.treadmill },
                                { name: 'BIA', value: pasien.bia },
                                { name: 'Spirometri', value: pasien.spirometri },
                                { name: 'Audiometri', value: pasien.audiometri },
                                { name: 'Papsmear', value: pasien.papsmear }
                            ];

                            let stepsHtml = '';
                            steps.forEach(step => {
                                // Jika kolom berisi 'tidak dilakukan', jangan tampilkan langkah ini
                                if (typeof step.value === 'string' && step.value.toLowerCase().includes('tidak dilakukan')) {
                                    return; // Lewati ke langkah berikutnya
                                }

                                const isCompleted = step.value ? 'list-group-item-light' : '';
                                const icon = step.value ? '<i class="fas fa-check-circle"></i>' : '<i class="far fa-clock"></i>';
                                const time = step.value ? new Date(step.value).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) : '';
                                stepsHtml += `
                                    <li class="list-group-item d-flex justify-content-between align-items-center ${isCompleted}">
                                        <div>
                                            <span class="me-3 icon-container">${icon}</span>
                                            <span class="fw-bold">${step.name}</span>
                                        </div>
                                        <span class="badge bg-secondary rounded-pill">${time}</span>
                                    </li>
                                `;
                            });

                            // Hanya render ulang jika kontennya berbeda untuk menghindari kedipan
                            const newContent = `
                                <div class="card shadow-sm">
                                    <div class="card-header bg-primary text-white text-center pt-4">
                                        <div id="qrcode-container" class="mx-auto mb-3 d-inline-block rounded"></div>
                                        <h1>${pasien.nama}</h1>
                                        <p class="mb-0 fw-bold">MRN: ${mrn}</p> <!-- Tampilkan MRN secara visual -->
                                        <p class="mb-0 small">(Pindai QR di atas untuk update di Pos Pemeriksaan)</p>
                                    </div>
                                    <div class="card-body">
                                        <h5 class="card-title text-center mb-3">Progres Pemeriksaan</h5>
                                        <ul class="list-group">
                                            ${stepsHtml}
                                        </ul>
                                    </div>
                                </div>
                            `;

                            if (detailContainer.innerHTML !== newContent) {
                                detailContainer.innerHTML = newContent; // Render konten baru

                                // Pastikan container QR ada dan kosongkan sebelum membuat yang baru
                                const qrcodeContainerEl = document.getElementById("qrcode-container");
                                if (qrcodeContainerEl) {
                                    qrcodeContainerEl.innerHTML = "";
                                }

                                // Tunda pembuatan QR code hingga setelah DOM di-update
                                setTimeout(() => {
                                    new QRCode(qrcodeContainerEl, {
                                        text: mrn, // Mengambil MRN langsung dari URL
                                        width: 250, // Perbesar ukuran QR code
                                        height: 250, // Perbesar ukuran QR code
                                        colorDark : "#000000",
                                        colorLight : "#ffffff",
                                        correctLevel : QRCode.CorrectLevel.H
                                    });
                                });
                            }
                        } else {
                            detailContainer.innerHTML = `<div class="alert alert-danger">${res.message}</div>`;
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching detail:', error);
                        // Jangan tampilkan error di setiap poll, cukup log di console
                    });
            };

            // Tampilkan loading saat pertama kali
            detailContainer.innerHTML = `<div class="text-center p-5"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div><p class="mt-2">Memuat data pasien...</p></div>`;
            
            // Panggil fungsi pertama kali
            fetchAndRenderData();

            // Atur interval untuk memanggil fungsi setiap 10 detik
            setInterval(fetchAndRenderData, 10000);
        });
    </script>

</body>
</html>
