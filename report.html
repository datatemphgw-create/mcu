<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <title>Laporan Waktu Pemeriksaan</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6;
        }

        .container {
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.85rem;
            background-color: #fff;
        }

        .data-table th,
        .data-table td {
            padding: 0.5rem;
            border: 1px solid #dee2e6;
            white-space: nowrap;
        }

        .data-table thead th {
            background-color: #007BFF;
            color: white;
            font-weight: 600;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table tbody td {
            text-align: center;
        }

        .data-table tbody td:nth-child(2) {
            text-align: left;
            white-space: normal;
        }

        .data-table tbody tr:hover {
            background-color: #f1f1f1;
        }

        .time-badge {
            background-color: #e9ecef;
            color: #495057;
            padding: 0.2em 0.5em;
            border-radius: 0.25rem;
            font-weight: 600;
            display: inline-block;
        }

        .icon-skipped {
            color: #dc3545;
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card shadow-sm">
            <div class="card-header">
                <div class="header-controls">
                    <h1 class="mb-0 fs-4"><i class="fas fa-chart-line me-2"></i>Laporan Waktu Pemeriksaan Pasien</h1>
                    <div>
                        <a href="index.html" class="btn btn-secondary me-2"><i class="fas fa-home me-1"></i> Home</a>
                        <button id="refresh-btn" class="btn btn-primary">
                            <i class="fas fa-sync-alt me-2"></i>Refresh Data
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Pasien</th>
                                <th>Pendaftaran</th>
                                <th>Timbang Tensi</th>
                                <th>Visus</th>
                                <th>Lab</th>
                                <th>Urine</th>
                                <th>EKG</th>
                                <th>Rontgen</th>
                                <th>Dokter</th>
                                <th>Treadmill</th>
                                <th>BIA</th>
                                <th>Spirometri</th>
                                <th>Audiometri</th>
                                <th>Papsmear</th>
                                <th>Total Waktu</th>
                            </tr>
                        </thead>
                        <tbody id="report-data-body">
                            <!-- Data akan diisi oleh JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const reportTableBody = document.getElementById('report-data-body');
        const refreshBtn = document.getElementById('refresh-btn');

        const BASE_URL = 'https://script.google.com/macros/s/AKfycbyy3KSVJTjsVozvo5MWcsbuPjYdzZ0t6c1Ske5DcNQXS5ERglK6JeFViLD4plQrVIlQ/exec';
        const READ_URL = `${BASE_URL}?action=read`;

        // Helper function untuk memformat timestamp
        const formatTimestamp = (value) => {
            if (!value) return '';
            const date = new Date(value);
            if (isNaN(date.getTime())) {
                if (typeof value === 'string' && value.toLowerCase().includes('tidak dilakukan')) {
                    return '<i class="fas fa-times icon-skipped" title="Tidak Dilakukan"></i>';
                }
                return value;
            }
            const timeString = date.toLocaleTimeString('id-ID', {
                hour: '2-digit',
                minute: '2-digit'
            }).replace('.', ':');
            return `<span class="time-badge">${timeString}</span>`;
        };

        // Fungsi untuk mengambil dan menampilkan data
        const fetchAndDisplayReport = () => {
            const originalButtonHTML = refreshBtn.innerHTML;
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Memuat...`;
            reportTableBody.innerHTML = '<tr><td colspan="16" style="text-align:center;">Memuat data...</td></tr>';

            fetch(READ_URL)
                .then(response => response.json())
                .then(res => {
                    reportTableBody.innerHTML = ''; // Kosongkan tabel body
                    if (res.status && res.data.length > 0) {
                        res.data.forEach((pasien, index) => {
                            const row = document.createElement('tr');
                            row.innerHTML = `
                                <td>${index + 1}</td>
                                <td>
                                    <strong>${pasien.nama}</strong><br>
                                    <small class="text-muted">${pasien.mrn}</small>
                                </td>
                                <td>${formatTimestamp(pasien.pendaftaran)}</td>
                                <td>${formatTimestamp(pasien.timbang_tensi)}</td>
                                <td>${formatTimestamp(pasien.visus)}</td>
                                <td>${formatTimestamp(pasien.lab)}</td>
                                <td>${formatTimestamp(pasien.urine)}</td>
                                <td>${formatTimestamp(pasien.ekg)}</td>
                                <td>${formatTimestamp(pasien.rontgen)}</td>
                                <td>${formatTimestamp(pasien.dokter)}</td>
                                <td>${formatTimestamp(pasien.treadmill)}</td>
                                <td>${formatTimestamp(pasien.bia)}</td>
                                <td>${formatTimestamp(pasien.spirometri)}</td>
                                <td>${formatTimestamp(pasien.audiometri)}</td>
                                <td>${formatTimestamp(pasien.papsmear)}</td>
                                <td>${pasien.total_waktu || ''}</td>
                            `;
                            reportTableBody.appendChild(row);
                        });
                    } else {
                        reportTableBody.innerHTML = '<tr><td colspan="16" class="text-center">Belum ada data.</td></tr>';
                    }
                })
                .catch(error => {
                    console.error('Error fetching data!', error.message);
                    reportTableBody.innerHTML = '<tr><td colspan="16" class="text-center text-danger">Gagal memuat data.</td></tr>';
                }).finally(() => {
                    refreshBtn.disabled = false;
                    refreshBtn.innerHTML = originalButtonHTML;
                });
        };

        refreshBtn.addEventListener('click', fetchAndDisplayReport);

        // Panggil fungsi untuk pertama kali saat halaman dimuat
        document.addEventListener('DOMContentLoaded', fetchAndDisplayReport);
    </script>
</body>

</html>
