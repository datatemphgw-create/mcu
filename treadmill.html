<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pos Treadmill</title>
    <!-- Bootstrap & Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <!-- QR Scanner & SweetAlert2 -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
        }
        #qr-reader {
            width: 100%;
            border: 1px solid #dee2e6;
            border-radius: .375rem;
        }
        .table {
            font-size: 0.9rem; /* Perkecil font di dalam tabel */
        }
    </style>
</head>
<body>

    <!-- Modal untuk QR Scanner -->
    <div class="modal fade" id="scannerModal" tabindex="-1" aria-labelledby="scannerModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="scannerModalLabel">Pindai QR Code Pasien</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="qr-reader"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h2 class="mb-0 fs-4"><i class="fas fa-person-running me-2"></i>Antrian Pasien - Pos Treadmill</h2>
                <span class="badge bg-light text-primary fs-6" id="queue-count">0</span>
            </div>
            <div class="card-body">
                <div class="d-grid gap-2 mb-3">
                    <button id="scan-btn" class="btn btn-success btn-lg"><i class="fas fa-qrcode me-2"></i>Pindai QR & Update</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>No</th>
                                <th>Nama Pasien</th>
                                <th>MRN</th>
                            </tr>
                        </thead>
                        <tbody id="patient-queue-body">
                            <!-- Daftar antrian akan diisi oleh JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const patientQueueBody = document.getElementById('patient-queue-body');
            const scanBtn = document.getElementById('scan-btn');
            const queueCountBadge = document.getElementById('queue-count');
            const scannerModal = new bootstrap.Modal(document.getElementById('scannerModal'));
            
            // --- KONFIGURASI UNTUK SETIAP HALAMAN ---
            const STEP_NAME = "treadmill"; // Ganti ini untuk setiap halaman
            // -----------------------------------------

            const BASE_URL = 'https://script.google.com/macros/s/AKfycbyy3KSVJTjsVozvo5MWcsbuPjYdzZ0t6c1Ske5DcNQXS5ERglK6JeFViLD4plQrVIlQ/exec';
            const READ_URL = `${BASE_URL}?action=read`;
            const POST_URL = BASE_URL;

            const fetchAndRenderQueue = () => {
                patientQueueBody.innerHTML = '<tr><td colspan="3" class="text-center"><div class="spinner-border spinner-border-sm"></div></td></tr>';
                fetch(READ_URL)
                    .then(response => response.json())
                    .then(res => {
                        patientQueueBody.innerHTML = '';
                        if (res.status) {
                            // Filter pasien yang kolom step-nya masih kosong (belum diisi timestamp atau "tidak dilakukan")
                            const queue = res.data.filter(pasien => pasien[STEP_NAME] === "");
                            queueCountBadge.textContent = queue.length; // Update jumlah antrian
                            if (queue.length > 0) {
                                queue.forEach((pasien, index) => {
                                    const row = patientQueueBody.insertRow();
                                    row.innerHTML = `
                                        <td>${index + 1}</td>
                                        <td><strong>${pasien.nama}</strong></td>
                                        <td>${pasien.mrn}</td>
                                    `;
                                });
                            } else {
                                patientQueueBody.innerHTML = '<tr><td colspan="3" class="text-center">Tidak ada pasien dalam antrian.</td></tr>';
                            }
                        }
                    })
                    .catch(err => {
                        patientQueueBody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">Gagal memuat antrian.</td></tr>';
                    });
            };

            const updatePatientStep = (mrn) => {
                const payload = {
                    action: "updatestep",
                    mrn: mrn,
                    step: STEP_NAME,
                    value: new Date().toISOString()
                };

                Swal.fire({
                    title: 'Mengupdate Data...',
                    text: `MRN: ${mrn}`,
                    didOpen: () => { Swal.showLoading() },
                    allowOutsideClick: false
                });

                fetch(POST_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(res => {
                    if (res.status) {
                        Swal.fire('Berhasil!', `Pemeriksaan untuk MRN ${mrn} telah selesai.`, 'success');
                        fetchAndRenderQueue(); // Muat ulang antrian
                    } else {
                        throw new Error(res.message);
                    }
                })
                .catch(err => {
                    Swal.fire('Error!', `Gagal mengupdate: ${err.message}`, 'error');
                });
            };

            // --- Logika QR Scanner ---
            const html5QrCode = new Html5Qrcode("qr-reader");
            const onScanSuccess = (decodedText, decodedResult) => {
                html5QrCode.stop();
                scannerModal.hide();
                updatePatientStep(decodedText);
            };

            scanBtn.addEventListener('click', () => {
                scannerModal.show();
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    onScanSuccess,
                    (errorMessage) => { /* abaikan error */ }
                ).catch((err) => {
                    Swal.fire('Error Kamera', 'Tidak dapat memulai kamera. Pastikan Anda memberikan izin.', 'error');
                });
            });

            // Hentikan kamera saat modal ditutup
            document.getElementById('scannerModal').addEventListener('hidden.bs.modal', () => {
                if (html5QrCode.isScanning) {
                    html5QrCode.stop();
                }
            });

            // Panggil fungsi pertama kali dan set interval refresh
            fetchAndRenderQueue();
            setInterval(fetchAndRenderQueue, 30000); // Refresh antrian setiap 30 detik
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
